name: "Fork Release (macOS)"

# Publishes a NON-DRAFT GitHub Release for this fork with Tauri updater
# artifacts (.app.tar.gz + .sig + latest.json), so installed builds can
# auto-update from this fork. macOS Apple code-signing is intentionally
# skipped (unsigned personal build); only the Tauri updater signature is
# applied, which is what the in-app updater verifies.

on:
  workflow_dispatch:

concurrency:
  group: fork-release-${{ github.ref }}
  cancel-in-progress: false

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  fork-release-macos:
    name: Build & publish macOS release (Apple Silicon)
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tauri.conf.json
        id: get-version
        shell: bash
        run: |
          VERSION=$(grep -o '"version": "[^"]*"' frontend/src-tauri/tauri.conf.json | cut -d'"' -f4)
          echo "Application version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: macos-latest-aarch64-apple-darwin

      - name: Install frontend dependencies
        run: |
          cd frontend
          pnpm install

      - name: Build llama-helper sidecar
        run: |
          echo "Building llama-helper sidecar with Metal support..."
          cargo build --release -p llama-helper --features metal
          mkdir -p frontend/src-tauri/binaries
          cp target/release/llama-helper frontend/src-tauri/binaries/llama-helper-aarch64-apple-darwin
          ls -la frontend/src-tauri/binaries/

      - name: Cache FFmpeg binary
        uses: actions/cache@v4
        with:
          path: frontend/src-tauri/binaries/ffmpeg-*
          key: ${{ runner.os }}-ffmpeg-${{ hashFiles('frontend/src-tauri/build.rs', 'frontend/src-tauri/build/ffmpeg.rs') }}

      - name: Build Tauri app and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater signing (required so the in-app updater can verify)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Match the existing (unsigned) build env; empty if not set on the fork
          MEETILY_RSA_PUBLIC_KEY: ${{ secrets.MEETILY_RSA_PUBLIC_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        with:
          projectPath: frontend
          tagName: v${{ steps.get-version.outputs.version }}
          releaseName: "Meetily v${{ steps.get-version.outputs.version }}"
          releaseBody: "Personal fork build with global recording hotkey and in-app update button. Unsigned (right-click → Open on first launch)."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: --target aarch64-apple-darwin
